<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JIG借用</title>

    <style>
        body {
            font-family: Arial;
            font-size: 16px;
            background:#f5f5f5;
            padding:20px;
        }

        /* Nút 3 chấm */
        .menu-btn {
            position: fixed;
            left: 10px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
        }

        /* Panel menu */
        .menu-panel {
            position: fixed;
            left: 0;
            top: 0;
            width: 180px;
            height: 100vh;
            background: #2c3e50;
            padding: 20px;
            display: none;
            flex-direction: column;
            z-index: 999;
        }

        .menu-panel a {
            color: white;
            text-decoration: none;
            padding: 10px 0;
            display: block;
            font-size: 16px;
        }

        .item {
            padding: 12px 14px;
            background: #fff;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .item input {
            margin-right: 12px;
            transform: scale(1.2);
        }

        button {
            padding: 12px;
            width: 100%;
            font-size: 17px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 16px;
        }

        input[type=date], input[type=text] {
            padding: 6px;
            font-size: 16px;
            width: 200px;
        }
    </style>
</head>

<body>

<!-- Nút 3 chấm -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- Menu -->
<div id="menu" class="menu-panel">
    <a href="/">メインメニュー</a>
    <a href="/borrow">JIG借用</a>
    <a href="/return">JIG返却</a>
    <a href="/logs">ログ履歴</a>
</div>

<h2>借用可能なJIG一覧</h2>

<div id="list"></div>

<br>

<label>借用日:</label><br>
<input id="startDate" type="date"><br><br>

<label>返却予定日:</label><br>
<input id="endDate" type="date"><br><br>

<label>借用者名:</label><br>
<input id="userName" type="text" placeholder="名前を入力"><br><br>

<button onclick="confirmBorrow()">借用を確定する</button>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

fetch("/api/jigs?category=HEAD")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        data.items.forEach(jig => {
            const desc = jig.desc && jig.desc.trim() !== "" ? jig.desc : "（説明なし）";
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
                <input type="checkbox" value="${jig.id}">
                <b>${jig.id}</b> — ${desc}
            `;
            list.appendChild(div);
        });
    });

function confirmBorrow() {
    const selected = [...document.querySelectorAll("input[type=checkbox]:checked")].map(x => x.value);
    if (selected.length === 0) return alert("JIGを選択してください。");

    const startDate = document.getElementById("startDate").value;
    if (!startDate) return alert("借用日を入力してください。");

    const endDate = document.getElementById("endDate").value;
    if (!endDate) return alert("返却予定日を入力してください。");

    const user = document.getElementById("userName").value.trim();
    if (!user) return alert("借用者名を入力してください。");

    fetch("/api/borrow-final", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            jigs: selected,
            start_date: startDate,
            end_date: endDate,
            user: user
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("ご利用ありがとうございました。\nJIGの借用が完了しました。\n情報はデータに更新されました。");
        window.location.href = "/";
    });
}
</script>

</body>
</html>
