<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JIG管理</title>

    <style>
        body {
            font-family: Arial;
            font-size: 16px;
            background: #f5f5f5;
            padding: 20px;
        }

        /* Nút 3 chấm */
        .menu-btn {
            position: fixed;
            left: 10px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
        }

        /* Panel menu */
        .menu-panel {
            position: fixed;
            left: 0;
            top: 0;
            width: 180px;
            height: 100vh;
            background: #2c3e50;
            padding: 20px;
            display: none;
            flex-direction: column;
            z-index: 999;
        }

        .menu-panel a {
            color: white;
            text-decoration: none;
            padding: 10px 0;
            display: block;
            font-size: 16px;
        }
    </style>
</head>

<body>

<!-- Nút 3 chấm -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- Menu -->
<div id="menu" class="menu-panel">
    <a href="/borrow">JIG借用</a>
    <a href="/return">JIG返却</a>
    <a href="/logs">ログ履歴</a>
</div>

<h2>ようこそ！</h2>
<p>これはチーム1のJIG管理ページです。</p>
<p>左上の「☰」をクリックしてメニューを開いてください。</p>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
