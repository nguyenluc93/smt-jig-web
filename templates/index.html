<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SMT JIG 管理 Web</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f1f2f6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        #sidebar {
            width: 240px;
            background: #2d3436;
            color: white;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            transition: 0.3s ease;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
        }

        #sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 0.6s forwards;
        }

        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #3d3d3d;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.25s;
            opacity: 0;
            animation: slideIn 0.4s forwards;
        }

        .menu-item:hover {
            background: #00cec9;
        }

        .icon {
            font-size: 20px;
        }

        /* CONTENT */
        #content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: white;
            border-radius: 12px 0 0 12px;
            margin: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }

        #content h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #2d3436;
        }

        .category-button {
            padding: 12px 18px;
            background: #0984e3;
            color: white;
            border-radius: 8px;
            margin: 8px 0;
            display: inline-block;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .category-button:hover {
            background: #0766b8;
            transform: translateY(-2px);
        }

        /* FORM INPUT */
        input[type="date"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #27ae60;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #1e874b;
            transform: translateY(-2px);
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #sidebar {
                width: 70px;
            }

            #sidebar h2 {
                display: none;
            }

            .label {
                display: none;
            }

            .menu-item {
                justify-content: center;
            }

            #content {
                margin: 0;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h2>メニュー</h2>

        <div class="menu-item" onclick="showBorrow()">
            <span class="icon">📥</span> <span class="label">JIG 借用</span>
        </div>

        <div class="menu-item" onclick="showReturn()">
            <span class="icon">📤</span> <span class="label">JIG 返却</span>
        </div>

        <div class="menu-item" onclick="showReserve()">
            <span class="icon">📅</span> <span class="label">JIG 予約</span>
        </div>

        <div class="menu-item" onclick="showConsumable()">
            <span class="icon">📦</span> <span class="label">消耗品 使用</span>
        </div>

        <div class="menu-item" onclick="showStatus()">
            <span class="icon">📊</span> <span class="label">状況一覧</span>
        </div>
    </div>

    <!-- CONTENT -->
    <div id="content">
        <h1>これは第1グループのJIG貸出・返却管理Webです</h1>
        <p>左のメニューから操作を選択してください。</p>
    </div>

<script>
/* ============================
   HOME
============================ */
function showHome() {
    document.getElementById("content").innerHTML = `
        <h1>これは第1グループのJIG貸出・返却管理Webです</h1>
        <p>左のメニューから操作を選択してください。</p>
    `;
}

/* ============================
   BORROW FLOW
============================ */
function showBorrow() {
    document.getElementById("content").innerHTML = `
        <h1>JIG 借用</h1>
        <div class="category-button" onclick="loadCategory('HEAD')">ヘッドOH用</div><br>
        <div class="category-button" onclick="loadCategory('MOVE')">移設/新規納品用</div><br>
        <div class="category-button" onclick="loadCategory('LINEAR')">その他交換用</div><br>
    `;
}

function loadCategory(category) {
    fetch(`/api/jigs?category=${category}`)
        .then(res => res.json())
        .then(data => {
            let html = `<h1>${data.category_name} — 借用可能なJIG一覧</h1>`;
            html += `<form id="borrowForm">`;

            data.items.forEach(jig => {
                if (jig.status === "在庫") {
                    html += `
                        <label style="display:block; margin:8px 0;">
                            <input type="checkbox" name="jig" value="${jig.id}">
                            ${jig.id} — ${jig.desc}
                        </label>
                    `;
                }
            });

            html += `
                <br>
                <button type="button" onclick="confirmBorrowMulti()">借用を確定する</button>
            `;

            html += `</form>`;
            document.getElementById("content").innerHTML = html;
        });
}

function confirmBorrowMulti() {
    const form = document.getElementById("borrowForm");
    const selected = [...form.querySelectorAll("input[name='jig']:checked")]
                    .map(cb => cb.value);

    if (selected.length === 0) {
        alert("JIGを選択してください。");
        return;
    }

    window.selectedJigs = selected;

    document.getElementById("content").innerHTML = `
        <h1>借用日を入力してください</h1>

        <label>🟦 借出日:</label><br>
        <input id="startDate" type="date"><br><br>

        <label>🟨 返却予定日:</label><br>
        <input id="endDate" type="date"><br><br>

        <button onclick="submitBorrowDates()">確定</button>
    `;
}

function submitBorrowDates() {
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    if (!start || !end) {
        alert("日付を入力してください。");
        return;
    }

    fetch("/api/borrow-final", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            jigs: window.selectedJigs,
            start_date: start,
            end_date: end
        })
    })
    .then(res => res.json())
    .then(data => {
        let html = `<h1>借用結果</h1>`;
        data.results.forEach(r => {
            html += `<p>${r}</p>`;
        });

        html += `<br><h2>ご利用ありがとうございました。</h2>`;
        document.getElementById("content").innerHTML = html;
    });
}

/* ============================
   RETURN FLOW
============================ */
function showReturn() {
    fetch("/api/returnable")
        .then(res => res.json())
        .then(data => {
            let html = `<h1>返却可能なJIG一覧</h1>`;
            html += `<form id="returnForm">`;

            data.items.forEach(jig => {
                html += `
                    <label style="display:block; margin:8px 0;">
                        <input type="checkbox" name="jig" value="${jig.id}">
                        ${jig.id} — ${jig.desc}（借用者: ${jig.user}）
                    </label>
                `;
            });

            html += `
                <br>
                <button type="button" onclick="confirmReturnMulti()">返却を確定する</button>
            `;

            html += `</form>`;
            document.getElementById("content").innerHTML = html;
        });
}

function confirmReturnMulti() {
    const form = document.getElementById("returnForm");
    const selected = [...form.querySelectorAll("input[name='jig']:checked")]
                    .map(cb => cb.value);

    if (selected.length === 0) {
        alert("JIGを選択してください。");
        return;
    }

    window.selectedReturn = selected;

    document.getElementById("content").innerHTML = `
        <h1>返却日を入力してください</h1>

        <label>📤 返却日:</label><br>
        <input id="returnDate" type="date"><br><br>

        <button onclick="submitReturn()">確定</button>
    `;
}

function submitReturn() {
    const date = document.getElementById("returnDate").value;

    if (!date) {
        alert("返却日を入力してください。");
        return;
    }

    fetch("/api/return-final", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            jigs: window.selectedReturn,
            return_date: date
        })
    })
    .then(res => res.json())
    .then(data => {
        let html = `<h1>返却結果</h1>`;
        data.results.forEach(r => {
            html += `<p>${r}</p>`;
        });

        html += `<br><h2>返却が完了しました。ありがとうございました。</h2>`;
        document.getElementById("content").innerHTML = html;
    });
}

/* ============================
   STATUS LIST
============================ */
function showStatus() {
    fetch("/api/status")
        .then(res => res.json())
        .then(data => {
            let html = `<h1>JIG 状況一覧</h1>`;

            data.items.forEach(jig => {
                html += `
                    <p>
                        <b>${jig.id}</b> — ${jig.desc}<br>
                        状態: ${jig.status}<br>
                        使用者: ${jig.user || "ー"}<br>
                        借出日: ${jig.borrow || "ー"}<br>
                        返却予定日: ${jig.return || "ー"}
                    </p>
                    <hr>
                `;
            });

            document.getElementById("content").innerHTML = html;
        });
}

/* ============================
   PLACEHOLDER
============================ */
function showReserve() {
    document.getElementById("content").innerHTML = `
        <h1>JIG 予約</h1>
        <p>予約機能は現在準備中です。</p>
    `;
}

function showConsumable() {
    document.getElementById("content").innerHTML = `
        <h1>消耗品 使用</h1>
        <p>消耗品管理は現在準備中です。</p>
    `;
}
</script>

</body>
</html>
