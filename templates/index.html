<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JIG借用</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background: #f5f5f5;
            font-size: 15px;
        }

        .sidebar {
            width: 180px;
            background: #2c3e50;
            color: white;
            height: 100vh;
            padding: 16px;
            box-sizing: border-box;
        }

        .sidebar a {
            display: block;
            padding: 10px 12px;
            margin-bottom: 10px;
            background: #34495e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
        }

        .content {
            flex: 1;
            padding: 18px;
        }

        .jig-item {
            background: white;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 15px;
            display: flex;
            align-items: center;
        }

        .jig-item input {
            margin-right: 12px;
            transform: scale(1.3);
        }

        .confirm-btn {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 16px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>メニュー</h2>
    <a href="/">JIG借用</a>
    <a href="/return">JIG返却</a>
</div>

<div class="content">
    <h2>借用可能なJIG一覧</h2>

    <div id="jigList"></div>

    <label>借用日:</label><br>
    <input id="startDate" type="date" style="padding:6px; font-size:15px; width:180px;"><br><br>

    <label>返却予定日:</label><br>
    <input id="endDate" type="date" style="padding:6px; font-size:15px; width:180px;"><br><br>

    <button class="confirm-btn" onclick="confirmBorrow()">借用を確定する</button>
</div>

<script>
fetch("/api/jigs")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("jigList");
        data.items.forEach(jig => {
            const div = document.createElement("div");
            div.className = "jig-item";
            div.innerHTML = `<input type="checkbox" value="${jig.id}"> ${jig.id} — ${jig.desc}`;
            list.appendChild(div);
        });
    });

function confirmBorrow() {
    const selected = [...document.querySelectorAll("input[type=checkbox]:checked")].map(x => x.value);
    if (selected.length === 0) return alert("JIGを選択してください");

    const user = prompt("借用者の名前を入力してください");
    if (!user) return;

    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    if (!start || !end) return alert("日付を入力してください");

    fetch("/api/borrow-final", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            jigs: selected,
            start_date: start,
            end_date: end,
            user: user
        })
    })
    .then(() => alert("借用完了"))
    .then(() => location.reload());
}
</script>

</body>
</html>
