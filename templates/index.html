<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f5f6fa;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* SIDEBAR */
    #sidebar {
        width: 240px;
        background: #2d3436;
        color: white;
        display: flex;
        flex-direction: column;
        padding-top: 20px;
        transition: 0.3s;
    }

    #sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 18px;
        font-weight: 600;
    }

    .menu-item {
        padding: 15px 20px;
        cursor: pointer;
        border-bottom: 1px solid #3d3d3d;
        font-size: 16px;
        transition: 0.2s;
    }

    .menu-item:hover {
        background: #00cec9;
    }

    /* CONTENT */
    #content {
        flex: 1;
        padding: 25px;
        overflow-y: auto;
        background: white;
        border-radius: 12px 0 0 12px;
        margin: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    #content h1 {
        font-size: 22px;
        margin-bottom: 15px;
        color: #2d3436;
    }

    .category-button {
        padding: 12px 18px;
        background: #0984e3;
        color: white;
        border-radius: 8px;
        margin: 8px 0;
        display: inline-block;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
    }

    .category-button:hover {
        background: #0766b8;
    }

    /* FORM INPUT */
    input[type="date"] {
        padding: 10px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
    }

    button {
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }

    /* RESPONSIVE FOR MOBILE */
    @media (max-width: 768px) {
        #sidebar {
            width: 70px;
        }

        #sidebar h2 {
            display: none;
        }

        .menu-item {
            font-size: 0;
            padding: 18px;
            text-align: center;
        }

        .menu-item::after {
            content: "•";
            font-size: 22px;
        }

        #content {
            margin: 0;
            border-radius: 0;
        }
    }
</style>
