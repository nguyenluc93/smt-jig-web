<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SMT JIG 管理 Web</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        /* Sidebar */
        #sidebar {
            width: 240px;
            background: #2c3e50;
            color: white;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
        }

        #sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #34495e;
        }

        .menu-item:hover {
            background: #1abc9c;
        }

        /* Main content */
        #content {
            flex: 1;
            padding: 30px;
            background: white;
            overflow-y: auto;
        }

        #content h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .category-button {
            padding: 12px 20px;
            background: #3498db;
            color: white;
            border-radius: 6px;
            margin: 10px 0;
            display: inline-block;
            cursor: pointer;
        }

        .category-button:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <h2>メニュー</h2>
        <div class="menu-item" onclick="showHome()">ホーム</div>
        <div class="menu-item" onclick="showBorrow()">JIG 借用</div>
        <div class="menu-item" onclick="showReturn()">JIG 返却</div>
        <div class="menu-item" onclick="showReserve()">JIG 予約</div>
        <div class="menu-item" onclick="showConsumable()">消耗品 使用</div>
        <div class="menu-item" onclick="showStatus()">状況一覧</div>
    </div>

    <!-- Main content -->
    <div id="content">
        <h1>これは第1グループのJIG貸出・返却管理Webです</h1>
        <p>左のメニューから操作を選択してください。</p>
    </div>

<script>
    function showHome() {
        document.getElementById("content").innerHTML = `
            <h1>これは第1グループのJIG貸出・返却管理Webです</h1>
            <p>左のメニューから操作を選択してください。</p>
        `;
    }

    function showBorrow() {
        document.getElementById("content").innerHTML = `
            <h1>JIG 借用</h1>
            <div class="category-button">ヘッドOH用</div><br>
            <div class="category-button">移設/新規納品用</div><br>
            <div class="category-button">その他交換用</div><br>
        `;
    }

    function showReturn() {
        document.getElementById("content").innerHTML = `
            <h1>JIG 返却</h1>
            <p>貸出中のJIG一覧をここに表示します。</p>
        `;
    }

    function showReserve() {
        document.getElementById("content").innerHTML = `
            <h1>JIG 予約</h1>
            <div class="category-button">ヘッドOH用</div><br>
            <div class="category-button">移設/新規納品用</div><br>
            <div class="category-button">その他交換用</div><br>
        `;
    }

    function showConsumable() {
        document.getElementById("content").innerHTML = `
            <h1>消耗品 使用</h1>
            <p>消耗品リストをここに表示します。</p>
        `;
    }

    function showStatus() {
        document.getElementById("content").innerHTML = `
            <h1>状況一覧</h1>
            <p>全てのJIGの状態をここに表示します。</p>
        `;
    }
</script>

</body>
</html>
