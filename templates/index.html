<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JIG管理システム</title>

    <style>
        body { margin: 0; font-family: Arial; display: flex; background: #f5f5f5; }
        .sidebar { width: 220px; background: #2c3e50; color: white; height: 100vh; padding: 20px; }
        .sidebar a { display: block; padding: 12px; background: #34495e; margin-bottom: 10px; color: white; border-radius: 8px; }
        .content { flex: 1; padding: 20px; }
        .jig-item { background: white; padding: 14px; margin-bottom: 12px; border-radius: 10px; }
        .confirm-btn { width: 100%; padding: 18px; background: #27ae60; color: white; border: none; border-radius: 12px; font-size: 20px; }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>メニュー</h2>
    <a href="/">JIG借用</a>
    <a href="/return">JIG返却</a>
</div>

<div class="content">
    <h2>借用可能なJIG一覧</h2>
    <div id="jigList"></div>
    <button class="confirm-btn" onclick="confirmBorrow()">借用を確定する</button>
</div>

<script>
fetch("/api/jigs")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("jigList");
        data.items.forEach(jig => {
            const div = document.createElement("div");
            div.className = "jig-item";
            div.innerHTML = `<input type="checkbox" value="${jig.id}"> ${jig.id} — ${jig.desc}`;
            list.appendChild(div);
        });
    });

function confirmBorrow() {
    const selected = [...document.querySelectorAll("input[type=checkbox]:checked")].map(x => x.value);
    if (selected.length === 0) return alert("JIGを選択してください");

    const user = prompt("借用者の名前を入力してください");
    if (!user) return;

    fetch("/api/borrow-final", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            jigs: selected,
            start_date: "2026/04/08",
            end_date: "2026/04/10",
            user: user
        })
    })
    .then(() => alert("借用完了"))
    .then(() => location.reload());
}
</script>

</body>
</html>
