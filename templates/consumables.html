<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>消耗品入力</title>

    <style>
        body {
            font-family: Arial;
            font-size: 16px;
            background:#f5f5f5;
            padding:20px;
        }

        /* Nút 3 chấm */
        .menu-btn {
            position: fixed;
            left: 10px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
        }

        /* Panel menu */
        .menu-panel {
            position: fixed;
            left: 0;
            top: 0;
            width: 180px;
            height: 100vh;
            background: #2c3e50;
            padding: 20px;
            display: none;
            flex-direction: column;
            z-index: 999;
        }

        .menu-panel a {
            color: white;
            text-decoration: none;
            padding: 10px 0;
            display: block;
            font-size: 16px;
        }

        .item {
            padding: 12px 14px;
            background: #fff;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 16px;
        }

        input[type=number] {
            width: 80px;
            padding: 6px;
            font-size: 16px;
        }

        button {
            padding: 12px;
            width: 100%;
            font-size: 17px;
            border: none;
            border-radius: 10px;
            margin-top: 16px;
        }

        .btn-ok {
            background: #27ae60;
            color: white;
        }

        .btn-none {
            background: #7f8c8d;
            color: white;
        }
    </style>
</head>

<body>

<!-- Nút 3 chấm -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- Menu -->
<div id="menu" class="menu-panel">
    <a href="/">メインメニュー</a>
    <a href="/borrow">JIG借用</a>
    <a href="/return">JIG返却</a>
    <a href="/logs">ログ履歴</a>
</div>

<h2>消耗品の使用入力</h2>

<p>返却したJIG: <b id="jigName"></b></p>

<div id="list"></div>

<button class="btn-ok" onclick="submitConsumables()">確認</button>
<button class="btn-none" onclick="noConsumables()">消耗品なし</button>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

const params = new URLSearchParams(window.location.search);
const jig = params.get("jig");
const user = params.get("user");

document.getElementById("jigName").innerText = jig;

fetch("/api/consumables")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        data.items.forEach(item => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
                <b>${item.name}</b>（在庫: ${item.stock}）<br>
                使用数: <input type="number" min="0" value="0" id="qty-${item.name}">
            `;
            list.appendChild(div);
        });
    });

function submitConsumables() {
    const inputs = document.querySelectorAll("input[type=number]");
    const items = [];

    inputs.forEach(i => {
        const qty = parseInt(i.value);
        if (qty > 0) {
            items.push({
                name: i.id.replace("qty-", ""),
                qty: qty
            });
        }
    });

    fetch("/api/consumables-final", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            jig: jig,
            user: user,
            items: items
        })
    })
    .then(() => {
        alert("ご利用ありがとうございました。\n情報が記録されました。");
        window.location.href = "/";
    });
}

function noConsumables() {
    alert("ご利用ありがとうございました。\n情報が記録されました。");
    window.location.href = "/";
}
</script>

</body>
</html>
