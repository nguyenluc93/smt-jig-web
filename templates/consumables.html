<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>消耗品確認</title>

    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            font-size: 15px; 
            background:#f5f5f5;
            margin-left:200px; /* ĐẨY NỘI DUNG SANG PHẢI */
        }
        .sidebar {
            width:180px;
            background:#2c3e50;
            color:white;
            height:100vh;
            padding:16px;
            box-sizing:border-box;
            position:fixed;
            left:0;
            top:0;
        }
        .sidebar a {
            color:white; 
            text-decoration:none; 
            display:block; 
            padding:8px 0;
            font-size:15px;
        }
        .item {
            padding: 12px 14px;
            background: #fff;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 15px;
        }
        input[type=number] { width: 80px; padding: 6px; font-size: 15px; }
        button {
            padding: 14px;
            width: 100%;
            font-size: 17px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 16px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>メニュー</h2>
    <a href="/">JIG借用</a>
    <a href="/return">JIG返却</a>
    <a href="/logs">ログ履歴</a>
</div>

<h2>消耗品の使用確認</h2>
<p>返却したJIG: <span id="jigName"></span></p>

<div id="list"></div>

<button onclick="submitConsumables()">確定する</button>

<script>
const jig = new URLSearchParams(window.location.search).get("jig");
document.getElementById("jigName").innerText = jig;

fetch("/api/consumables")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        data.items.forEach(item => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
                <b>${item.name}</b> (在庫: ${item.stock})<br>
                使用数: <input type="number" min="0" value="0" id="qty-${item.name}">
            `;
            list.appendChild(div);
        });
    });

function submitConsumables() {
    const inputs = document.querySelectorAll("input[type=number]");
    const items = [];

    inputs.forEach(i => {
        const qty = parseInt(i.value);
        if (qty > 0) {
            items.push({
                name: i.id.replace("qty-", ""),
                qty: qty
            });
        }
    });

    const user = prompt("名前を入力してください");

    fetch("/api/consumables-final", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            jig: jig,
            user: user,
            items: items
        })
    })
    .then(() => {
        alert("登録完了しました");
        window.location.href = "/";
    });
}
</script>

</body>
</html>
