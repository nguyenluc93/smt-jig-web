<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログ履歴</title>

    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            font-size: 15px; 
            background:#f5f5f5;
            margin-left:200px; /* ĐẨY NỘI DUNG SANG PHẢI */
        }
        .sidebar {
            width:180px;
            background:#2c3e50;
            color:white;
            height:100vh;
            padding:16px;
            box-sizing:border-box;
            position:fixed;
            left:0;
            top:0;
        }
        .sidebar a {
            color:white; 
            text-decoration:none; 
            display:block; 
            padding:8px 0;
            font-size:15px;
        }
        .log-item {
            background:white;
            padding:12px 14px;
            margin-bottom:10px;
            border-radius:8px;
            font-size:15px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>メニュー</h2>
    <a href="/">JIG借用</a>
    <a href="/return">JIG返却</a>
    <a href="/logs">ログ履歴</a>
</div>

<h2>JIG 貸出・返却ログ</h2>

<div id="list"></div>

<script>
fetch("/api/logs")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");

        data.items.forEach(r => {
            const div = document.createElement("div");
            div.className = "log-item";

            div.innerHTML = `
                <b>${r.datetime}</b><br>
                JIG: ${r.jig}<br>
                借用者: ${r.user}<br>
                借用日: ${r.borrow_date}<br>
                返却日: ${r.return_date}
            `;

            list.appendChild(div);
        });
    });
</script>

</body>
</html>
