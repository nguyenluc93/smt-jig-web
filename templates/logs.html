<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログ履歴</title>

    <style>
        body {
            font-family: Arial;
            font-size: 16px;
            background:#f5f5f5;
            padding:20px;
        }

        /* Nút 3 chấm */
        .menu-btn {
            position: fixed;
            left: 10px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
        }

        /* Panel menu */
        .menu-panel {
            position: fixed;
            left: 0;
            top: 0;
            width: 180px;
            height: 100vh;
            background: #2c3e50;
            padding: 20px;
            display: none;
            flex-direction: column;
            z-index: 999;
        }

        .menu-panel a {
            color: white;
            text-decoration: none;
            padding: 10px 0;
            display: block;
            font-size: 16px;
        }

        .log-item {
            background:white;
            padding:12px 14px;
            margin-bottom:10px;
            border-radius:8px;
            font-size:16px;
        }
    </style>
</head>

<body>

<!-- Nút 3 chấm -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- Menu -->
<div id="menu" class="menu-panel">
    <a href="/">メインメニュー</a>
    <a href="/borrow">JIG借用</a>
    <a href="/return">JIG返却</a>
    <a href="/logs">ログ履歴</a>
</div>

<h2>JIG 貸出・返却ログ</h2>

<div id="list"></div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

fetch("/api/logs")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");

        data.items.forEach(r => {
            const div = document.createElement("div");
            div.className = "log-item";

            div.innerHTML = `
                <b>${r.datetime}</b><br>
                JIG: ${r.jig}<br>
                借用者: ${r.user}<br>
                借用日: ${r.borrow_date}<br>
                返却日: ${r.return_date}
            `;

            list.appendChild(div);
        });
    });
</script>

</body>
</html>
