<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JIG返却</title>

    <style>
        body { font-family: Arial; padding: 20px; font-size: 15px; background:#f5f5f5; }
        .item {
            padding: 12px 14px;
            background: #fff;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 15px;
            display: flex;
            align-items: center;
        }
        .item input { margin-right: 12px; transform: scale(1.3); }
        button {
            padding: 14px;
            width: 100%;
            font-size: 17px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 16px;
        }
    </style>
</head>

<body>

<h2>返却可能なJIG一覧</h2>

<div id="list"></div>

<label>返却日:</label><br>
<input id="returnDate" type="date" style="padding:6px; font-size:15px; width:180px;"><br><br>

<button onclick="confirmReturn()">返却を確定する</button>

<script>
fetch("/api/returnable")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        data.items.forEach(jig => {
            const desc = jig.desc && jig.desc.trim() !== "" ? jig.desc : "（説明なし）";
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
                <input type="checkbox" value="${jig.id}">
                <b>${jig.id}</b> — ${desc}<br>
                <span style="color:#555;">借用者: ${jig.user}</span>
            `;
            list.appendChild(div);
        });
    });

function confirmReturn() {
    const selected = [...document.querySelectorAll("input[type=checkbox]:checked")].map(x => x.value);
    if (selected.length === 0) return alert("選択してください");

    const returnDate = document.getElementById("returnDate").value;
    if (!returnDate) return alert("返却日を入力してください");

    fetch("/api/return-final", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            jigs: selected,
            return_date: returnDate
        })
    })
    .then(res => res.json())
    .then(() => {
        window.location.href = "/consumables?jig=" + selected[0];
    });
}
</script>

</body>
</html>
